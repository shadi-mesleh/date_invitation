<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> مرحبا أنا شادي 😎</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:30px;
    padding:0 20px;
}

button{
    border:none;
    border-radius:12px;
    padding:15px 30px;
    font-size:22px;
    cursor:pointer;
    transition:0.2s;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:fixed;
}

#success{
    display:none;
    background:white;
    padding:30px;
    border-radius:15px;
    max-width:350px;
}
</style>
</head>
<body>

<div class="container" id="question">
    <h1>راح نروح مشوار لو لا يا معودة 😡</h1>

    <button id="yes">نعم 😍</button>
    <button id="no">لا 🫪</button>
</div>

<div id="success">
    <h2>🎉 رائع!</h2>
    <p>اختاري الموعد المناسب:</p>

    <input type="date"><br><br>
    <input type="time"><br><br>

    <button onclick="finish()">دزي يابه</button>

    <div id="done"></div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

let yesSize = 1;

function moveNoButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";

    yesSize += 0.15;
    yesBtn.style.transform = `scale(${yesSize})`;
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("click", e => {
    e.preventDefault();
    moveNoButton();
});

noBtn.addEventListener("touchstart", e => {
    e.preventDefault();
    moveNoButton();
});

document.getElementById("yes").addEventListener("click", () => {
    document.getElementById("question").style.display = "none";
    document.getElementById("success").style.display = "block";
});

function finish(){
    document.getElementById("done").innerHTML =
    "<h3>❤️ تم تسجيل الموعد بنجاح ❤️</h3>";
}
</script>

</body>
</html>
