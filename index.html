<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سؤال مهم ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#fff;
    margin-bottom:40px;
}

button{
    font-size:22px;
    padding:15px 35px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

#success{
    display:none;
    background:white;
    padding:30px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container" id="question">
    <h1>هل تقبلين الخروج معي لتناول القهوة؟ ☕❤️</h1>

    <button id="yes">نعم 😊</button>
    <button id="no">لا 😅</button>
</div>

<div id="success">
    <h2>رائع! 🎉</h2>
    <p>اخترِي الموعد المناسب:</p>

    <input type="date"><br><br>
    <input type="time"><br><br>

    <button onclick="finish()">إرسال</button>

    <div id="done"></div>
</div>

<script>
const noBtn = document.getElementById("no");

function moveButton(){
    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 70;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

document.getElementById("yes").addEventListener("click", () => {
    document.getElementById("question").style.display = "none";
    document.getElementById("success").style.display = "block";
});

function finish(){
    document.getElementById("done").innerHTML =
        "<h3>تم إرسال الموافقة بنجاح ❤️</h3>";
}
</script>

</body>
</html>
